[workspace]
authors = ["obi <ole.bialas@posteo.de>"]
channels = ["conda-forge"]
name = "anda-course"
platforms = ["linux-64", "osx-64", "win-64", "osx-arm64"]
version = "0.1.0"

[tasks]
install-kernel = "python -m ipykernel install --user --name anda-d3"

[dependencies]
python = "3.13.*"
numpy = ">=2.4.6,<3"
matplotlib = ">=3.10.9,<4"
scikit-learn = ">=1.9.0,<2"
ipykernel = ">=7.2.0,<8"
requests = ">=2.34.2,<3"

[pypi-dependencies]
neo = ">=0.14.4, <0.15"
elephant = ">=1.2.0, <2"
viziphant = ">=0.4.0, <0.5"

### Jupyter Lab Environment (pixi run jupyter) #############

[feature.jupyter.dependencies]
python = "3.13.*"

[feature.jupyter.pypi-dependencies]
jupyterlab = ">=4"

[feature.jupyter.tasks]
jupyter = "jupyter lab"

[environments.jupyter]
features = ["jupyter"]
no-default-feature = true

################################################



